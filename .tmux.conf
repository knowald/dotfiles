# Set prefix to CTRL-A instead of CTRL-B
set -g prefix C-a
bind C-a send-prefix

# Enable mouse mode (clickable windows, panes, resizing)
set -g mouse on

# Please start from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Open new tabs, windows, splits in the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reorder windows # https://superuser.com/a/552493
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# Make the scroll chill a bit
bind -T copy-mode-vi WheelUpPane send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down

# Send pane to specific window with fewer keystrokes
bind S command-prompt -p "send pane to:" "join-pane -t '%%'"

# Join marked pane to current window (mark with m, clear with M)
bind J join-pane

# Right-click pane menu: tmux 3.4 default plus "Break To Window" (break-pane),
# menu splits open in the current directory
bind-key -T root MouseDown3Pane \
    if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" \
    { select-pane -t = ; send-keys -M } \
    { display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
        "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } \
        "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } \
        '' \
        "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t=" ; send-keys -X -t = search-backward "#{q:mouse_word}" } \
        "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y { copy-mode -q ; send-keys -l "#{q:mouse_word}" } \
        "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c { copy-mode -q ; set-buffer "#{q:mouse_word}" } \
        "#{?mouse_line,Copy Line,}" l { copy-mode -q ; set-buffer "#{q:mouse_line}" } \
        "#{?buffer_name,,-}Paste" p { paste-buffer } \
        '' \
        "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h { copy-mode -q ; send-keys -l "#{q:mouse_hyperlink}" } \
        "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h { copy-mode -q ; set-buffer "#{q:mouse_hyperlink}" } \
        '' \
        "Horizontal Split" | { split-window -h -c "#{pane_current_path}" } \
        "Vertical Split" v { split-window -v -c "#{pane_current_path}" } \
        "#{?#{>:#{window_panes},1},,-}Break To Window" b { break-pane } \
        '' \
        "#{?#{>:#{window_panes},1},,-}Swap Up" u { swap-pane -U } \
        "#{?#{>:#{window_panes},1},,-}Swap Down" d { swap-pane -D } \
        "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } \
        "#{?pane_marked_set,,-}Join Marked Here" J { join-pane } \
        "Send To Window..." S { command-prompt -p "send pane to:" "join-pane -t '%%'" } \
        '' \
        Kill X { kill-pane } \
        Respawn R { respawn-pane -k } \
        "#{?pane_marked,Unmark,Mark}" m { select-pane -m } \
        "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z { resize-pane -Z } \
        "#{?#{>:#{window_panes},1},,-}#{?pane_synchronized,Sync Off,Sync On}" y { set-window-option synchronize-panes } \
    }

# Don't wait, just escape
setw -g escape-time 0

# Pane borders: show path | command, SSH panes highlighted via @is_ssh flag
set -g pane-border-status top
set -g pane-border-lines double
set -g pane-border-format "#{?#{==:#{@is_ssh},1},#{?pane_active,#[fg=#f2cc8f],#[fg=#444c56]} #{pane_title} #[default], #{pane_current_path} | #{pane_current_command} }"
set -g allow-rename off

# Match active pane border color and allow-rename to SSH status on pane switch
set-hook -g after-select-pane 'if -F "#{==:#{@is_ssh},1}" "set pane-active-border-style fg=#f2cc8f; set allow-rename on" "set pane-active-border-style fg=#0797d3; set allow-rename off"'

# Allow passthrough for notifications
set -g allow-passthrough all
set -g visual-bell off       # Don't show message
set -g bell-action none      # Don't send bell to terminal
set -g monitor-bell on       # But still flag the window in status bar
set -g window-status-bell-style 'fg=red,bg=default,bold'

###############
#### THEME ####
###############
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",gnome*:RGB"

# Github colors for Tmux
set -g mode-style "fg=#c9d1d9,bg=#1f2428"

set -g message-style "fg=#c9d1d9,bg=#1f2428"
set -g message-command-style "fg=#c9d1d9,bg=#1f2428"

set -g pane-border-style "fg=#444c56"
set -g pane-active-border-style "fg=#0797d3"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#0797d3,bg=#1f2428"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1f2428,bg=#0797d3,bold] #S #[fg=#0797d3,bg=#1f2428,nobold,nounderscore,noitalics]"
set -g status-right ""

setw -g window-status-activity-style "underscore,fg=#d1d5da,bg=#1f2428"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#24292e,bg=#1f2428"
setw -g window-status-format "#[fg=#1f2428,bg=#1f2428,nobold,nounderscore,noitalics]#[#{?window_bell_flag,fg=#ff6666 bold,fg=#666666 nobold},bg=#1f2428,nounderscore,noitalics] #I  #W #F #[fg=#1f2428,bg=#1f2428,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1f2428,bg=#e1e4e8,nobold,nounderscore,noitalics]#[=#586069,bg=#e1e4e8,bold] #I  #W #F #[fg=#e1e4e8,bg=#1f2428,nobold,nounderscore,noitalics]"

set-option -g renumber-windows on

# Danke https://github.com/tmux-plugins/tmux-sensible
set -g history-limit 500000
set -g focus-events on
set -g display-time 4000
set -g status-interval 5
