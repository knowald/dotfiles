# Dracula theme for Alacritty
# https://draculatheme.com/alacritty
#
# Color palette
# https://spec.draculatheme.com
#
# Template
# https://github.com/alacritty/alacritty/blob/master/alacritty.yml

[window]
padding = { x = 2, y = 2 }
option_as_alt = "Both"

[colors]
[colors.primary]
background = '#25272c'
foreground = '#f8f8f2'

[colors.normal]
black = '#000000'
red = '#ff5555'
green = '#50fa7b'
yellow = '#f1fa8c'
blue = '#caa9fa'
magenta = '#ff79c6'
cyan = '#8be9fd'
white = '#bfbfbf'

[colors.bright]
black = '#575b70'
red = '#ff6e67'
green = '#5af78e'
yellow = '#f4f99d'
blue = '#caa9fa'
magenta = '#ff92d0'
cyan = '#9aedfe'
white = '#e6e6e6'

[font]
[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Retina"
[font.offset]
x = 0
y = 2
[font.glyph_offset]
x = 0
y = 0

[keyboard]
bindings = [
  { key = "Left", mods = "Alt", chars = "\u001bB" },
  { key = "Right", mods = "Alt", chars = "\u001bF" },
  { key = "Left", mods = "Command", chars = "\u001bOH" },
  { key = "Right", mods = "Command", chars = "\u001bOF" },
  { key = "Back", mods = "Command", chars = "\u0015" },
]

[env]
TERM = "xterm-256color"
