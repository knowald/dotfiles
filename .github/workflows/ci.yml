name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  brewfile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile parses
        run: brew bundle list --file=Brewfile >/dev/null
